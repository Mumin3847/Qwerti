 <!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Home — QwertiRoles</title>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet"/>
  <style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#07080C;--bg2:#0D0F17;--bg3:#12151F;--bg4:#181B27;
  --border:rgba(255,255,255,0.06);--border2:rgba(255,255,255,0.13);
  --text:#E8EAF0;--muted:#5A6070;--muted2:#8892A0;
  --cyan:#00D4FF;--pink:#E273FF;--gold:#FFB800;
  --green:#00E88F;--orange:#FF9B3E;--red:#FF5E5E;--purple:#9B6EFF;
}
html{scroll-behavior:smooth}
body{background:var(--bg);color:var(--text);font-family:'Inter',sans-serif;font-size:15px;line-height:1.6;overflow-x:hidden}
body::before{content:'';position:fixed;inset:0;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.025'/%3E%3C/svg%3E");pointer-events:none;z-index:0;opacity:0.5}

/* NAV */
nav{position:fixed;top:0;left:0;right:0;z-index:200;display:flex;align-items:center;justify-content:space-between;padding:13px 40px;background:rgba(7,8,12,0.88);backdrop-filter:blur(28px);-webkit-backdrop-filter:blur(28px);border-bottom:1px solid var(--border)}
.nav-logo{display:flex;align-items:center;gap:10px;text-decoration:none}
.nav-logo img{width:28px;height:28px;border-radius:7px;background:#fff;padding:3px;object-fit:contain}
.nav-logo-text{font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:16.5px;color:#fff;letter-spacing:-0.3px}
.nav-logo-text span{color:var(--pink)}
.nav-links{display:flex;gap:4px;list-style:none}
.nav-links a{color:var(--muted2);text-decoration:none;font-size:13px;font-weight:500;padding:6px 12px;border-radius:7px;transition:all 0.2s}
.nav-links a:hover{color:#fff;background:rgba(255,255,255,0.05)}
.nav-links a.active{color:#fff;background:rgba(226,115,255,0.1);border:1px solid rgba(226,115,255,0.2)}
.nav-btns{display:flex;gap:9px;align-items:center}
.nav-ghost{color:var(--text);padding:7px 15px;border-radius:7px;border:1px solid var(--border2);font-size:13px;font-weight:500;text-decoration:none;transition:background 0.2s}
.nav-ghost:hover{background:rgba(255,255,255,0.05)}
.nav-solid{background:var(--pink);color:#fff;padding:7px 17px;border-radius:7px;font-size:13px;font-weight:600;text-decoration:none;box-shadow:0 0 18px rgba(226,115,255,0.28);transition:opacity 0.2s,transform 0.15s}
.nav-solid:hover{opacity:0.88;transform:translateY(-1px)}
.hamburger{display:none;flex-direction:column;gap:5px;cursor:pointer;padding:4px}
.hamburger span{display:block;width:22px;height:2px;background:var(--muted2);border-radius:2px}
.mobile-menu{display:none;position:fixed;top:55px;left:0;right:0;background:rgba(7,8,12,0.98);border-bottom:1px solid var(--border);padding:20px 24px;z-index:199;flex-direction:column;gap:4px}
.mobile-menu a{color:var(--muted2);text-decoration:none;font-size:15px;font-weight:500;padding:12px 0;border-bottom:1px solid var(--border);display:block}
.mobile-menu a.active{color:var(--pink)}
.mobile-menu.open{display:flex}

/* ANNOUNCE */
.announce{background:linear-gradient(90deg,rgba(226,115,255,0.09),rgba(0,212,255,0.09));border-bottom:1px solid rgba(226,115,255,0.13);text-align:center;padding:9px 20px;font-size:13px;color:var(--muted2);position:relative;z-index:99;margin-top:55px}
.announce a{color:var(--pink);text-decoration:none;font-weight:600}
.announce-dot{display:inline-block;width:6px;height:6px;border-radius:50%;background:var(--pink);margin-right:8px;animation:pulse 2s infinite;vertical-align:middle}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:0.4;transform:scale(0.7)}}

/* BUTTONS */
.btn-pink{background:var(--pink);color:#fff;padding:13px 30px;border-radius:9px;font-size:14px;font-weight:600;text-decoration:none;display:inline-block;transition:transform 0.15s,box-shadow 0.2s;box-shadow:0 4px 24px rgba(226,115,255,0.3)}
.btn-pink:hover{transform:translateY(-2px);box-shadow:0 10px 36px rgba(226,115,255,0.42)}
.btn-outline{background:transparent;color:var(--text);padding:13px 28px;border-radius:9px;border:1px solid var(--border2);font-size:14px;font-weight:500;text-decoration:none;display:inline-block;transition:border-color 0.2s,background 0.2s}
.btn-outline:hover{border-color:rgba(255,255,255,0.25);background:rgba(255,255,255,0.03)}
.btn-cyan{background:var(--cyan);color:#07080C;padding:13px 30px;border-radius:9px;font-size:14px;font-weight:600;text-decoration:none;display:inline-block;transition:transform 0.15s,box-shadow 0.2s;box-shadow:0 4px 24px rgba(0,212,255,0.25)}
.btn-cyan:hover{transform:translateY(-2px);box-shadow:0 10px 36px rgba(0,212,255,0.38)}

/* PAGE HEADER */
.page-header{padding:100px 24px 64px;text-align:center;position:relative;overflow:hidden}
.page-header-orb{position:absolute;top:0;left:50%;transform:translateX(-50%);width:600px;height:400px;background:radial-gradient(ellipse,rgba(226,115,255,0.07) 0%,transparent 65%);pointer-events:none}
.page-tag{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:2.5px;color:var(--pink);margin-bottom:14px}
.page-title{font-family:'Space Grotesk',sans-serif;font-size:clamp(36px,5vw,60px);font-weight:700;color:#fff;letter-spacing:-2px;line-height:1.08;margin-bottom:16px}
.page-desc{color:var(--muted2);max-width:500px;margin:0 auto;font-size:16px;line-height:1.72}

/* SECTION UTILS */
.section-tag{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:2.5px;color:var(--pink);margin-bottom:12px}
.section-title{font-family:'Space Grotesk',sans-serif;font-size:clamp(26px,3.5vw,40px);font-weight:700;color:#fff;letter-spacing:-1.2px;line-height:1.12}
.section-desc{color:var(--muted2);margin-top:10px;font-size:14.5px;line-height:1.7}
.section-line{width:36px;height:3px;background:var(--pink);border-radius:2px;margin-top:16px}
.wrap{max-width:1100px;margin:0 auto;padding:0 24px}
.wrap-sm{max-width:740px;margin:0 auto;padding:0 24px}
hr.divider{border:none;border-top:1px solid var(--border)}

/* ROLE CARDS */
.roles-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:14px}
.role-card{position:relative;background:var(--bg2);border:1px solid var(--border);border-radius:16px;padding:26px;overflow:hidden;transition:transform 0.22s,border-color 0.22s,box-shadow 0.22s}
.role-card:hover{transform:translateY(-4px);border-color:rgba(var(--card-rgb,226,115,255),0.25);box-shadow:0 16px 48px rgba(0,0,0,0.4)}
.card-glow{position:absolute;top:-70px;right:-70px;width:180px;height:180px;border-radius:50%;background:radial-gradient(ellipse,rgba(var(--card-rgb,226,115,255),1),transparent 70%);opacity:0.05;pointer-events:none;transition:opacity 0.3s}
.role-card:hover .card-glow{opacity:0.1}
.card-top{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:16px;gap:8px}
.role-badge{display:inline-flex;align-items:center;gap:4px;padding:4px 11px;border-radius:100px;font-size:11.5px;font-weight:600;background:rgba(var(--card-rgb,226,115,255),0.1);color:var(--card-color,var(--pink));border:1px solid rgba(var(--card-rgb,226,115,255),0.18)}
.role-badge::before{content:'@';opacity:0.5;font-size:10px}
.card-chip{font-size:10px;font-weight:600;letter-spacing:1.5px;text-transform:uppercase;color:var(--muted);background:var(--bg3);padding:3px 9px;border-radius:5px;white-space:nowrap}
.role-name{font-family:'Space Grotesk',sans-serif;font-size:21px;font-weight:700;color:#fff;letter-spacing:-0.4px;margin-bottom:9px}
.role-desc{color:var(--muted2);font-size:13.5px;line-height:1.65;margin-bottom:18px}
.role-req{padding-top:14px;border-top:1px solid var(--border);display:flex;align-items:center;gap:8px;font-size:12px;color:var(--card-color,var(--pink));font-weight:500}
.req-dot{width:5px;height:5px;border-radius:50%;background:var(--card-color,var(--pink));flex-shrink:0}
.mystery-card{background:linear-gradient(135deg,rgba(155,110,255,0.07) 0%,var(--bg2) 55%)}
.mystery-chip{position:absolute;top:18px;right:18px;font-size:10px;font-weight:700;letter-spacing:2px;color:var(--purple);text-transform:uppercase;background:rgba(155,110,255,0.12);border:1px solid rgba(155,110,255,0.22);padding:3px 9px;border-radius:5px}

/* LADDER */
.ladder{max-width:680px;margin:0 auto}
.ladder-row{display:flex;gap:18px;margin-bottom:4px;position:relative}
.ladder-row:not(:last-child)::before{content:'';position:absolute;left:19px;top:42px;width:2px;height:calc(100% + 4px);background:linear-gradient(to bottom,var(--border2),var(--border));z-index:0}
.l-dot{flex-shrink:0;width:40px;height:40px;border-radius:50%;border:2px solid var(--card-color,var(--pink));background:rgba(var(--card-rgb,226,115,255),0.1);display:flex;align-items:center;justify-content:center;font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:13px;color:var(--card-color,var(--pink));position:relative;z-index:1}
.l-body{background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:14px 18px;flex:1;transition:border-color 0.2s}
.l-body:hover{border-color:var(--border2)}
.l-title{font-family:'Space Grotesk',sans-serif;font-weight:600;font-size:15px;color:#fff;margin-bottom:2px}
.l-meta{color:var(--muted2);font-size:12.5px}
.l-req{font-size:11.5px;font-weight:500;margin-top:5px}

/* RANK TABLE */
.rank-table{background:var(--bg2);border:1px solid var(--border);border-radius:16px;overflow:hidden}
.rank-head{display:grid;padding:14px 22px;border-bottom:1px solid var(--border);background:var(--bg3)}
.rank-head span{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:1.2px;color:var(--muted)}
.rank-row{display:grid;padding:18px 22px;border-bottom:1px solid var(--border);align-items:center;transition:background 0.2s}
.rank-row:last-child{border-bottom:none}
.rank-row:hover{background:var(--bg3)}
.rank-num{font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:16px;color:var(--muted)}
.rank-num.t1{color:var(--gold)}
.rank-num.t2{color:var(--muted2)}
.rank-num.t3{color:var(--orange)}
.rank-role{display:flex;align-items:center;gap:12px}
.rank-emoji{font-size:24px}
.rank-rname{font-family:'Space Grotesk',sans-serif;font-weight:600;font-size:15px;color:#fff}
.rank-rdesc{font-size:12px;color:var(--muted2);margin-top:1px}
.rank-val{font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:15px;color:var(--green)}
.rank-sub{font-size:11px;color:var(--muted);margin-top:2px}
.rank-badge2{display:inline-block;padding:3px 10px;border-radius:5px;font-size:11px;font-weight:600;background:rgba(var(--card-rgb,226,115,255),0.1);color:var(--card-color,var(--pink));border:1px solid rgba(var(--card-rgb,226,115,255),0.15)}

/* CTA BAND */
.cta-band{position:relative;overflow:hidden;background:linear-gradient(135deg,rgba(226,115,255,0.08) 0%,rgba(0,212,255,0.05) 100%);border-top:1px solid rgba(226,115,255,0.13);border-bottom:1px solid rgba(226,115,255,0.13);padding:88px 24px;text-align:center}
.cta-band::before{content:'';position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:600px;height:400px;background:radial-gradient(ellipse,rgba(226,115,255,0.08) 0%,transparent 65%);pointer-events:none}
.cta-logo{width:64px;height:64px;object-fit:contain;border-radius:16px;background:#fff;padding:7px;margin:0 auto 24px;display:block;box-shadow:0 0 50px rgba(226,115,255,0.28)}
.cta-band h2{font-family:'Space Grotesk',sans-serif;font-size:clamp(28px,4vw,46px);font-weight:700;color:#fff;letter-spacing:-1.5px;margin-bottom:14px}
.cta-band p{color:var(--muted2);max-width:440px;margin:0 auto 36px;font-size:15.5px;line-height:1.72}
.cta-btns{display:flex;gap:12px;justify-content:center;flex-wrap:wrap}

/* FOOTER */
.footer-wrap{border-top:1px solid var(--border)}
footer{max-width:1100px;margin:0 auto;padding:44px 24px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:24px}
.footer-brand-row{display:flex;align-items:center;gap:10px}
.footer-brand-row img{width:28px;height:28px;border-radius:7px;background:#fff;padding:3px;object-fit:contain}
.footer-brand-name{font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:15px;color:#fff}
.footer-brand-name span{color:var(--pink)}
.footer-copy{color:var(--muted);font-size:12px;margin-top:3px}
.footer-links{display:flex;gap:22px;flex-wrap:wrap}
.footer-links a{color:var(--muted2);font-size:13px;text-decoration:none;transition:color 0.2s}
.footer-links a:hover{color:#fff}
.footer-social{display:flex;gap:10px}
.social-btn{width:36px;height:36px;border-radius:8px;border:1px solid var(--border2);display:flex;align-items:center;justify-content:center;font-size:15px;text-decoration:none;transition:all 0.2s}
.social-btn:hover{border-color:var(--pink);background:rgba(226,115,255,0.06)}

/* REVEAL */
.reveal{opacity:0;transform:translateY(20px);transition:opacity 0.5s ease,transform 0.5s ease}
.reveal.visible{opacity:1;transform:translateY(0)}

@media(max-width:768px){
  nav{padding:12px 20px}
  .nav-links,.nav-btns{display:none}
  .hamburger{display:flex}
  footer{flex-direction:column;text-align:center}
  .footer-links,.footer-social{justify-content:center}
}

.hero{position:relative;min-height:92vh;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:80px 24px 60px;overflow:hidden}
.orb{position:absolute;border-radius:50%;pointer-events:none}
.orb1{top:5%;left:10%;width:560px;height:560px;background:radial-gradient(ellipse,rgba(226,115,255,0.07) 0%,transparent 65%);animation:float1 9s ease-in-out infinite}
.orb2{bottom:10%;right:5%;width:440px;height:440px;background:radial-gradient(ellipse,rgba(0,212,255,0.06) 0%,transparent 65%);animation:float2 11s ease-in-out infinite}
@keyframes float1{0%,100%{transform:translate(0,0)}50%{transform:translate(40px,-25px)}}
@keyframes float2{0%,100%{transform:translate(0,0)}50%{transform:translate(-25px,30px)}}
.hero-logo{width:84px;height:84px;object-fit:contain;border-radius:22px;background:#fff;padding:9px;margin-bottom:28px;box-shadow:0 0 60px rgba(226,115,255,0.32);animation:logoPulse 3.5s ease-in-out infinite}
@keyframes logoPulse{0%,100%{box-shadow:0 0 60px rgba(226,115,255,0.32)}50%{box-shadow:0 0 90px rgba(226,115,255,0.5)}}
.hero-badge{display:inline-flex;align-items:center;gap:8px;background:rgba(226,115,255,0.08);border:1px solid rgba(226,115,255,0.2);border-radius:100px;padding:6px 16px;font-size:11.5px;font-weight:500;color:var(--pink);letter-spacing:1.2px;text-transform:uppercase;margin-bottom:28px}
.badge-dot{width:6px;height:6px;border-radius:50%;background:var(--pink);animation:pulse 2s infinite}
h1{font-family:'Space Grotesk',sans-serif;font-size:clamp(46px,7.5vw,88px);font-weight:700;line-height:1.01;letter-spacing:-3.5px;color:#fff;margin-bottom:22px}
h1 .c-pink{color:var(--pink)}
h1 .c-cyan{color:var(--cyan)}
h1 .c-dim{color:rgba(255,255,255,0.2)}
.hero-sub{max-width:490px;color:var(--muted2);font-size:16.5px;line-height:1.75;margin-bottom:42px}
.hero-sub strong{color:var(--text)}
.hero-btns{display:flex;gap:12px;flex-wrap:wrap;justify-content:center;margin-bottom:64px}
.hero-scroll{display:flex;flex-direction:column;align-items:center;gap:8px}
.scroll-label{font-size:10.5px;letter-spacing:2px;text-transform:uppercase;color:var(--muted)}
.scroll-line{width:1px;height:44px;background:linear-gradient(to bottom,var(--pink),transparent);animation:scrollAnim 2.2s ease-in-out infinite}
@keyframes scrollAnim{0%{transform:scaleY(0);transform-origin:top}50%{transform:scaleY(1);transform-origin:top}51%{transform-origin:bottom}100%{transform:scaleY(0);transform-origin:bottom}}
.trust-bar{background:var(--bg2);border-top:1px solid var(--border);border-bottom:1px solid var(--border);padding:20px 40px;display:flex;align-items:center;justify-content:center;gap:48px;flex-wrap:wrap}
.trust-item{display:flex;align-items:center;gap:9px;color:var(--muted2);font-size:13px;font-weight:500}
.trust-icon{font-size:18px}
.stats-bar{display:flex;justify-content:center;border-bottom:1px solid var(--border)}
.stats-inner{display:flex;max-width:960px;width:100%;flex-wrap:wrap}
.stat{flex:1;min-width:120px;padding:28px 20px;text-align:center;border-right:1px solid var(--border);position:relative;overflow:hidden}
.stat:last-child{border-right:none}
.stat::after{content:'';position:absolute;bottom:0;left:50%;transform:translateX(-50%);width:0;height:2px;background:var(--pink);transition:width 0.4s}
.stat:hover::after{width:60%}
.stat-num{font-family:'Space Grotesk',sans-serif;font-size:32px;font-weight:700;color:#fff;letter-spacing:-1.5px}
.stat-num span{color:var(--pink)}
.stat-label{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:1px;margin-top:4px}
.how{background:var(--bg2);padding:88px 24px;border-bottom:1px solid var(--border)}
.how-inner{max-width:1060px;margin:0 auto}
.center-header{text-align:center;max-width:520px;margin:0 auto 56px}
.how-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:2px;background:var(--border)}
.how-card{background:var(--bg2);padding:36px 28px;position:relative;overflow:hidden;transition:background 0.25s}
.how-card:hover{background:var(--bg3)}
.how-card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,var(--pink),var(--cyan));transform:scaleX(0);transition:transform 0.35s;transform-origin:left}
.how-card:hover::before{transform:scaleX(1)}
.how-num{font-family:'Space Grotesk',sans-serif;font-size:48px;font-weight:700;color:rgba(255,255,255,0.04);line-height:1;margin-bottom:18px}
.how-emoji{font-size:32px;margin-bottom:14px;display:block}
.how-title{font-family:'Space Grotesk',sans-serif;font-weight:600;font-size:17px;color:#fff;margin-bottom:9px}
.how-desc{color:var(--muted2);font-size:13.5px;line-height:1.65}
.featured-roles{padding:88px 24px}
.preview-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:14px;margin-top:36px}
.view-all-row{text-align:center;margin-top:36px}
.progress-section{background:var(--bg2);border-top:1px solid var(--border);border-bottom:1px solid var(--border);padding:80px 24px}
.progress-inner{max-width:900px;margin:0 auto}
.progress-grid{display:grid;grid-template-columns:1fr 1fr;gap:40px;margin-top:52px}
.progress-col-title{font-family:'Space Grotesk',sans-serif;font-weight:600;font-size:18px;color:#fff;margin-bottom:20px}
.checklist{display:flex;flex-direction:column;gap:10px}
.check-item{display:flex;align-items:flex-start;gap:12px;padding:14px 16px;background:var(--bg3);border-radius:10px;border:1px solid var(--border)}
.check-icon{flex-shrink:0;width:22px;height:22px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;margin-top:1px}
.check-icon.done{background:rgba(0,232,143,0.15);color:var(--green);border:1px solid rgba(0,232,143,0.25)}
.check-icon.pending{background:rgba(90,96,112,0.2);color:var(--muted);border:1px solid var(--border2)}
.check-text{font-size:14px;color:var(--text)}
.check-sub{font-size:12px;color:var(--muted2);margin-top:2px}
@media(max-width:900px){.how-grid{grid-template-columns:1fr 1fr}.progress-grid{grid-template-columns:1fr}}
@media(max-width:600px){.how-grid{grid-template-columns:1fr}.stats-inner{flex-wrap:wrap}.stat{min-width:50%;border-right:none;border-bottom:1px solid var(--border)}}
</style>
</head>

<nav>
  <a href="index.html" class="nav-logo">
