<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Billions Network Puzzle</title>
  <script src="https://cdn.jsdelivr.net/npm/jigsaw-puzzle@1.2.3/dist/jigsaw-puzzle.min.js"></script>
  <style>
    body {
      text-align: center;
      background: #0a0a0a;
      color: white;
      font-family: Arial;
    }
    #game {
      width: 95vw;
      height: 80vh;
      margin: auto;
    }
    button {
      padding: 10px 20px;
      margin: 10px;
      border-radius: 12px;
      border: none;
      background: #2196f3;
      color: white;
      font-size: 16px;
    }
  </style>
</head>
<body>
  <h2>🧩 Billions Network Puzzle</h2>
  <p id="info">Level 1</p>
  <div id="game"></div>
  <button id="next">Next Level</button>

  <script>
    let level = 1;
    const game = document.getElementById("game");
    const nextBtn = document.getElementById("next");

    // Replace with your own image links 👇
    const images = [
      "https://i.postimg.cc/SNsM7YKd/QZe8c-Ss-Q.jpg", 
      "https://i.postimg.cc/VsH6wGYK/1000226276-removebg-preview.png"
    ];

    function loadPuzzle() {
      game.innerHTML = "";
      document.getElementById("info").innerText =
        level === 1 ? "Level 1: First Image" : "Level 2: Second Image";
      puzzle({
        element: "#game",
        image: images[level - 1],
        piecesX: 4,
        piecesY: 4
      });
    }

    nextBtn.onclick = () => {
      level = level === 1 ? 2 : 1;
      loadPuzzle();
    };

    loadPuzzle();
  </script>
</body>
</html>
